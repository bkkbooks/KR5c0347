body:
  text: 前闕元君訣曰黃芽者五行甲子是也甲屬木木是陽之父母母屬北方之氣冬至後一陽生衝其日一陽生萌芽受氣於母故名甲甲依於土吐甲以生芽芽依於母母曰坤即是癸之黃芽六甲之位囚死休廢同其一甲在癸而絶位立五穀五果草木花卉長養萬類胎卵藥物人民皆從黃芽所生陽氣氤氲運動地為胎息為氣萬物以春夏發泄為黃芽秋冬收斂同成熟各歸其色反本味不改舊容盡名曰還丹之義反本也夫人改常即死物改色即壞乃知一物經火運動陽氣般載不改舊容與天地同造化還丹受氣反本也陽氣照耀凝結自然之道故曰黃芽世人莫知天地三光清濁初分人民萬物皆從黃芽所長不越五行而生黃芽者萌芽伸屈始初也因陽而結因陰而生陰陽交接當受氣之時初為混沌清濁分後始有黃芽在甲曰黃在句曰萌在伸曰芽名曰黃芽乃元和之氣不離五行五行水火金木土水潤下火炎上金從革木曲直土稼穡訣曰天地大道萬物久長元和之氣長生者莫過於日月星辰陰陽五行晝夜依土而生終歸於土隨四時更變然有限期亦是自然之道假今松脂含受太陽氣一千年化茯苓照耀復一千年為茯神更一千年為琥珀更一千年為水晶皆是日月之華氣照耀成精假令蟾蜍弄月蚌蛤有珠並是採弄含受太陽月華之氣成胎為珠是月之陰魄所結二味並堪服食偏治肺氣驚邪健忘以木蜜為丸麻子大食後津液下三丸蚌蛤亦能制汞夫人內修道德元和之氣沖融修養合道結精為珠自然長生珠居於赤水之中赤水者血也假令禽獸螻蟻解蟄伏藏者皆得元和之氣所託存生非關父母教令而得之悟怡悟怡自固其志音聲相和物類相感有無相貫陰陽相抱而全其道二氣和合有無相制無有相成成其道也河車者五金之主亦是北方之位水能渡車般載萬物輪環不住是陽居陰位陰含陽精金汞相得故曰河車是元和之祖立天地調陰陽四時行焉萬物生焉受氣曰命最靈曰人福莫大於生禍莫大於死既惡其死復欲其生是體大道也且余所注類異諸家義合正經理歸大道論卦象則火候為先釋藥物則陰陽為正參者雜也水土金三物同為一家如符若契契其一理故曰參同訣曰萬物非日月不生金水非火土不成金水即變化之元火土乃陰陽之道天地混沌之時天地默默雖未變化之初終為萬物之根金白水黑相會氣中狀如雞子陽燧以取火非日不生光犬戎以火鏡乘艾化之須臾即生象還丹陰陽今大唐國內時時有之書不盡言言不盡意然則聖人之意其不可見乎若用凡水銀為丹者妄人也言朱砂未得理能駐貌者不知道也即去真日遠矣或曰用凡鉛為水銀者而為之無靈蓋不悟水銀真鉛之正體唯讚凡鉛之功效不説水銀之精妙必以二事而成何得不兼而美之乎若用凡鉛為藥即去道乖遠若安水銀為金丹即不是真法若悟正法須悟水鉛火鉛為主但得鉛本氣遇五而成丹不遺本也若悟元化一施妙用無極若以外物為情則性不可合以水銀代汞則鉛不可親情性不可依三宫其何固乎鉛不可親八石豈能妙矣金重如本初金不失其重日月形如常汞不失斤兩是日與金本重我命在鉛不在天還丹成金億萬年鉛汞本一體無二也故曰天鉛莫壞我鉛令我命全莫破我車載我還家鉛者砂中自生曰鉛車者砂中抽出之液曰車金得火運動曰還丹金精黃牙制水不流溢金精之力玄水也金精黃牙同名自生鉛也水者是砂中抽出之液也用鉛不用鉛不用得長年用鉛者朱砂自有鉛相制不用鉛者世銀之母凡鉛也鉛若不真其汞難親鉛若是真不失家臣鉛若不真凡鉛也鉛若是真朱鉛也寧修鉛中金是丹砂中自生者曰金不修金中寶是水銀也聖人明喻以示後學鼎鼎是何鼎用丹砂本土為鼎也藥藥是何藥用丹砂中自然流出汞是藥也辨男女三一説黑白大易參同火鉛是丹砂被日月運動自生出汞為火鉛也水銀汞之異名是丹砂陽氣未足抽出為水銀水銀在丹砂中舍甲精氣足回然自生曰男男女相配陰陽自然其情更無異類金丹本乎一物而無二物入陽氣運動故名三一之道白者金精黑者水基歸一無二聖人託喻於周易爻象運動成丹制伏皆由父母運動豈越五行順其陰陽不失其時逆而用之即魂魄喪亡如日月交蝕失位不相賓伏聖人祕惜不能正論多有隱祕之言從此經訣差互多作不成金鼎之訣宜慎守之胡藥合和固不然矣天道難泄或隱玄象或託附陰陽潛説人間言微妙理群惑自迷暨乎羲皇已來好道求長生者甚衆遇而得之者寡矣擔率留臆而不鑒乎不求師授口訣只按古文立喻求出世之方虛自勤勞名山五嶽深谷幽溪朽敗腐儒自古迄今不死者未見得之食五穀縱六情生人在陽而鬼在陰陽耀陰藏更相朦昧復不能驅使鬼神策役陰陽未得出世之方例皆而死歸汩沒於世寒舉綿裘而內暖熱即單衣而飲水生於陰陽之界五行所管況食土所生之物死歸於土返本也若不遇日月之華氣運轉精液三一還丹焉能度行尸比肩若墜石投川而不能返淪殁而化亦可嗟乎若遇內外金丹餌之運形軀駐貌異常然可出陰陽之界五行不管死籍不録鬼神侍衛訣曰道有仙傳祕籙丹經龍虎上清五金相類周易參同契歌訣古人之意至於前聖後聖並得此道今之世人迷愚不悟為是修行得道之人次遇之不顯名得者隱之不一先後指訣密術祕籙歌訣爻象皆露枝條苗裔不肯具載而指徑門自古迄今遇者皆頌師受口訣而身之有分即非學矣傳得肘後方者密心自祕天道不可轉露泄之養虎自齧付不道之人殃罰七代謫身為下鬼世人知之有數非有分而遇之傳授並須探賾內行不二有分者乃可虔志誓言啓百靈對日月星辰分符受券方可傳之修行不二至藥無雙天人合道理契自然不可倉卒漁獵而得之遇師悟者一言大藥只有一門而有三物水土金非世間水土金凡物也得之魂魄所歸但行不二之心道師必當自至金砂內外丹得門餌之不死與天地齊畢敘長生肘後方以示後學不悟者矣右造鼎入金及直符用卦刻漏不載於此金丹服食變化五金制汞訣曰金丹守運十五日金性死一兩點汞一斤成白道守運三十日堪服可二兩守運四十五日或九十日或經四時足半兩點汞一斤為白道服食可一兩半守運二年一分點汞一斤為白道服食可三分守運三年大元之氣足刀圭制汞一斤為白道服食可一分守運五年刀圭點鐵及汞五金諸色瓦礫等各一斤並隨本色各成寶服食可一銖長生住世非止於人雞犬禽畜與服不死金重二十四銖為一兩刀圭一分也訣曰隨其守運上下日月年歲用藥多少制汞斤兩為金銀復將轉點銅鍮石為大銀每斤用藥銀二兩其汞銀但守運一年用三兩制汞一斤為白道還將守運至二年用二兩制汞一斤守運三年用一兩制汞一斤為白道還將守運至一年二年三年依法分兩制汞為白道還將守運轉為藥將頭制頭種類不絶是金丹元化一施子母妙用無極欲得神通變化須用本土為鼎及火候並依潛伏周而復始可為世珍仙祿也訣曰但取本色天鉛與世水銀分兩停止可配合至一斤入匱訖用本色為外鼎固濟作爐圈埋灰中向上灰可厚五寸長上頭運用火初五兩一伏時加至半斤一伏時加至十三兩一伏時又加至一斤只依此斤兩晝夜都至三十日取二兩點汞一斤為白道其銀一一兩還將轉點銅一斤為大銀訣曰其汞還將入匱守運但作術訣用火斤兩晝夜日數還將制汞子母相隨永無斷絶訣曰若將點鐵五金諸石了者並用得成珍何也緣是將頭制頭不是本受元氣之藥況不得本父母為氣神通有異只化得下術為白道服即不在議限緣有毒也作外鼎制汞法訣曰若急速用藥取本土捻為鼎子外鼎固濟如法深淺還依前法入金鼎固濟訖還埋灰中上頭用火初五兩一伏時加七兩一伏時加十二兩一伏時加至一斤復八伏時即於鼎四面用武火逼通赤半日許開取之一兩點汞一斤其藥换鼎子還用火一斤晝夜至一年即半兩點汞一斤為白道訣曰復换鼎用火一斤守二年一分半點汞一斤為白道復换鼎守至三年一分點汞一斤其鼎得逐年换制化與上同依年月用藥分兩點化並成珍服食即不可為不得元氣直符刻漏守運也訣曰制汞用藥之時但取汞用藥和研便投於鍋子中還以些些藥蓋之上以瓷器蓋四面濕紙纏却坐於虛灰中以火約半斤遙逼一盤飯久漸加火半日已來燒通赤須臾結硬作團伏火取鼓之始鎔成質為寶訣曰大丹守運三年氣足取之以木蜜為丸麻子大依分兩逐年服食取生成捧藥跪坐向日念天真餌之其丹繫一兩於左臂後出入往來奏表上書登壇拜謁人皆欽仰或有不意之心向人者自散入山及曠野晝夜逄惡獸鬼魅惡人皆自伏藏不敢為害繫於戰敵之處周匝侍護五百人不遭箭矢鋒刃所傷若所行之處土地靈祇侍衛若有藥書符籙作法尸解召集五嶽天仙龍神萬靈立至驅策自由世人有疾病將丹書字吞之立愈金鼎銘后土金鼎生死長七神室明三圓五深二混沌徘徊天地四星陰陽兩頭象如雞子形容莫差黃白在裏厚薄須勻六一固濟好守午門參同自契訣曰造鼎及入金訣但取所生朱砂下土或如黃蠟膩或青黑色取一二合研淘有石砂子或如油麻粒大小不等或黃黑色者研破有朱砂者此土力大搗篩訖但以和作泥熟為妙便固作鼎形如雞子長七寸圓五寸趁潤截兩斷造丸所曝乾鏇中心各闊三寸漸漸底尖各深二寸神室明裏與外並如雞子形兩扇脣口並鏇作雌雄不得參差將金水安在器中但分兩停不勒斤兩數入訖如法固濟任意臨時泥爐安置用直符長去鼎子底一寸蓋覆運動常以草灰掩蔽堅埋直符用事並依六候曆用火直符六候進退訣第一月一日初候發火一兩三十時至二日半加二兩至六十時第六日第二候初三兩三十時加至四兩滿六十時第十一日第三候初五兩三十時加至六兩六十時第十六日第四候初還用六兩三十時退至五兩六十時第二十一日第五候退用四兩三十時復退至三兩六十時第二十六日第六候退用二兩三十時復退一兩六十時右六候直符爻象生進退一月法例周而復始第二月初候二兩三十時加至三兩以次每遇换鼎入月頭初候加至一兩用事至九箇月初候用九兩是從一至九金虎吐精三十時加至十兩六十時以次直符合進合退但依法刻漏分明用火火盛之時象四月大王極陽用事進退潛伏陰陽刑刻過换鼎即土王金鄉三物俱喪是金土本氣相感也直符合退之時象五月陰氣用事一陰生上九亢龍有悔直符運動至九鼎是第九月後初候常九兩三十時加一兩六十時至第三候終用十四兩陽極第五候陰生却退十二兩三十時復退至十一兩至第六候退守十兩三十時復退至九兩六十時足第十月後不論年月常如取九月初候還用九兩三十時加一兩六十時至第三候用十四兩退至六候九兩六十時足以次序直符加減刻漏分明周而復始晝夜運動九祀而畢法訣曰從第一月初候發火用二十四銖火為一爻生也象計二十四氣守至二日半加一爻至五日為一候也以次用火加爻每月有六候常至第三候六十時下與第四候三十時上並用武火處也其火斤兩進退晝夜即須别添熟炭常應露火面則候為本斤兩數也其直符九箇月半畢後即須常取第九月火候爻象法則進退斤兩為定不論年月也復訣曰惟火候最難巡歷名山上格有共論之皆有所悟惟土惟火世之不傳余之肘後真訣其源直符更漏進退圖訣曰直符合加減時節須取刻漏分明合進退依法用之更漏合加減定時候盈縮有徑門而已但取晝夜長短刻十二辰子丑寅卯辰巳午未申酉戌亥等從子時初於水滴看日照至丑時合用多少水但作桶子高三尺內圓闊一尺近底稜邊鑽一小孔子內鳥翅翎管緊安其中蠟塞四面即盛水令滿任於滴下盡即却投在內任滴看至一辰位合用水幾桶子即知諸時用水桶數晝夜分十二辰位約定桶子多少與稱之更漏無别如滴水有多有少即晝夜長短但用意消息萬不失一用火進退直符火記正曆一月火候訣六十時是五日也第一初候一爻三十時加至二爻六十時第二初候三爻三十時加至四爻六十時第三初候五爻三十時加至六爻六十時第四初候還用六爻三十時退用五爻六十時第五初候退用四爻三十時復退至二爻六十時第六初候退用二爻三十時復退至一爻六十時二月火候訣第一初候二爻三十時加至三爻六十時第二初候四爻三十時加至五爻六十時第三初候六爻三十時加至七爻六十時第四初候還用七爻三十時退至六爻六十時第五初候退用五爻三十時退至四爻六十時第六初候退用三爻三十時復退至二爻六十時三月火候訣第一初候三爻三十時加至四爻六十時第二初候五爻三十時加至六爻六十時第三初候七爻三十時加至八爻六十時第四初候還用八爻三十時退至七爻六十時第五初候退至六爻三十時復退至五爻六十時第六初候退用四爻三十時復退至三爻六十時四月火候訣第一初候四爻三十時加至五爻六十時第二初候六爻三十時加至七爻六十時第三初候八爻三十時加至九爻六十時第四初候還用九爻三十時退用八爻六十時第五初候退用七爻三十時復退至六爻六十時第六初候退用五爻三十時復退至四爻六十時五月火候訣第一初候五爻三十時加至六爻六十時第二初候七爻三十時加至八爻六十時第三初候九爻三十時加至十爻六十時第四初候還用十爻三十時退用九爻六十時第五初候退用八爻三十時復退至七爻六十時第六初候退用六爻三十時復退至五爻六十時六月火候訣第一初候六爻三十時加至七爻六十時第二初候八爻三十時加至九爻六十時第三初候十爻三十時加至十一爻六十時第四初候還用十一爻三十時退至十爻六十時第五初候退用九爻三十時復退至八爻六十時第六初候退用七爻三十時復退至六爻六十時七月火候訣第一初候七爻三十時加至八爻六十時第二初候九爻三十時加至十爻六十時第三初候十一爻三十時加至十二爻六十時第四初候還用十二爻三十時退至十一爻六十時第五初候退用十爻三十時復退至九爻六十時第六初候退用八爻三十時復退至七爻六十時八月火候訣第一初候八爻三十時加至九爻六十時第二初候十爻三十時加至十一爻六十時第三初候十二爻三十時加至十三爻六十時第四初候還用十三爻三十時退至十二爻六十時第五初候退用十一爻三十時復退至十爻六十時第六初候退用九爻三十時復退至八爻六十時九月火候訣第一初候九爻三十時加至十爻六十時第二初候十一爻三十時加至十二爻六十時第三初候十三爻三十時加至十四爻六十時第四初候還用十四爻三十時退至十三爻六十時第五初候退用十二爻三十時復退至十一爻六十時第六初候十爻三十時復退至九爻六十時元君潛運手鏡訣訣曰天地二氣相感日月迭照成自然還丹上界仙官守護收採非俗士之所遇皆仙人則而取之三皇以敬至道修生以直符運動三年象自然之氣運火候依節符乾坤坎離運動火候斤兩須得真經師受口訣凡言不載若不從師受參差藥物交雜終無得理聖人觀天符之門守一但得本父母相制必成大丹則陰陽變化之道神通自在返歸其色訣曰直符法喻假令十一月建子陽氣始生法象夏至前一日夜雞鳴時一陰生陰氣用事是天地陰陽進退一年十二月生成用事也故月有六候直符生成潛伏五行出沒交會形刻並在內申故云火木前十五日白月三候極陽用事證後陽退陰生九六陰水也後十五日黑月三候極陰用事同而復始故七八九六道自合三十終金水本喻立月候晝夜用火潛伏象一年陰陽節候用直符晝夜此是天地樞機在乎手名曰出世之方神通變化玄之又玄但發火之時便是十一月受陽用事也訣曰第一鼎第一月初候火一爻生直符象十一月建子陽氣用事初九潛龍勿用一爻生晝夜二日半三十時加至二爻至五日一候六十時巡十一日一辰子丑寅卯辰巳午未申酉戌亥五周各六十時為一候初候五日驚蟄震來受符運至上弦八日金性低昂半受死守至十五日為一氣金性全滅二十日萌者不生陽伸陰屈水不動剛柔相使自然丹耳二十一日巽來受符金水性已滅竭亡二精呼吸吞飲同死震巽二木漸順汞雖得乾未是大丹三十日道窮返歸乎坤元受符成丹三物同沒於土四十五日為一節一節相嘔相通運至六十日卯當夾鍾夾到卯門榆莢墜落還歸其根二月榆死魁剛卯刑德相負晝夜始分故云榆莢丹訣曰日有三照月有三移日月合氣故萬物三變而至極經四時自然之道月有三百六十時時計象一年十二月得四千三百二十時一時當一年計四千三百二十年象自然之還丹陰陽交媾寒暑而成象訣曰潛伏陽伸陰屈餘並依節候卦象直符氣候法是九鼎九鼎九箇月訣曰九鼎各須三分者每鼎各守三十日受氣二百七十日足陰陽俱盛十月土王而生故云子母脫胎世人莫知之矣水火相尅互相制伏更為父母不越五行藏伏成形守運一千日大元氣足性歸北方癸水黑色始得名曰大還丹也訣曰取元氣金水但分兩停相和合其體本立喻上下弦數二八斤之數應陰陽二金本乎一物而生二象氣候雌雄黃白自然情性相依陰陽合為一體無二二曰火一曰水除水火為藥無别入分若有異類終不成丹得之不在斤兩數耳訣曰但將金水入鼎如法固濟取四殺刑尅陽日陽時發火自置更漏節候分明知加減不失金水在於鼎中混沌未分被直符運動陰陽交騰吞飲變化元氣清濁上下玄黃金水成形象雞子元氣在殼中受陽氣含其真而抱一也訣曰丹砂金砂金液倒長砂黃牙天鉛砂汞鉛汞真陰真陽金土水火乾坤坎離化生龍虎黑虎西靈金丹玉液九轉還返大還盡是還丹之異名皆是古人藏機之隱祕不一悟者若遇肘後訣參同契其理歸一無二故曰還丹還丹有返忌覆盆血覆盆血者不吉之人慎勿與同心泄天道也及合金入鼎直符用事鍊丹之所守慎清淨不穢無生死哭泣安尸靈屋宇不道之地須擇福德形勝安淨之處方可結壇焚香虔志祭祀土地靈祇水陸等方可安即百靈助祐天道和合諸仙來護但心行不二若於常常之處修鍊亦須謹淨觸穢不可容易爐樣及指藥所在圖本祭醮法則並在别訣中火瓶直符定節刻訣假令五月十七日子時起至二十日巳時過一五二十日午起至二十二日亥過二五二十二日子起至二十五日巳過三五二十五日午起至二十七日亥過四五二十七日子起至三十日巳過五五三十日午起至六月二日亥過六五六月二日子起至五日巳過退六五五日午起至七亥過退五五七日子起至十日巳過退四五十日午起至十二日亥過退三五十二日子起至十五日巳過退二五十五日午起至十七日亥過退一五玉清內書
